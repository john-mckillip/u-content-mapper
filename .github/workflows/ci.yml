name: CI/CD Pipeline

on:
  push:
    branches: [ main, 'release/v1.x' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, 'release/v1.x' ]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  test:
    name: Test and Coverage
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: write
      contents: write
      pull-requests: write
      security-events: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          9.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --no-restore --configuration Release

    - name: Run tests with coverage
      continue-on-error: true
      run: |
        dotnet test --no-build --configuration Release \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults \
          --logger "trx;LogFileName=test-results.trx" \
          --verbosity normal

    - name: Install ReportGenerator
      if: always()
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate coverage report
      if: always()
      run: |
        reportgenerator \
          -reports:"TestResults/**/coverage.cobertura.xml" \
          -targetdir:"TestResults/coveragereport" \
          -reporttypes:"Html;Badges;TextSummary" \
          -verbosity:Info \
          -title:"UContentMapper Code Coverage" \
          -tag:"${{ github.run_number }}_${{ github.run_id }}"
        
    - name: Deploy coverage report to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: TestResults/coveragereport
        branch: gh-pages
        token: ${{ secrets.GITHUB_TOKEN }}
        clean: true
        target-folder: coverage-reports/${{ github.run_number }}

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh pr comment "${{ github.event.pull_request.number }}" --body-file TestResults/coveragereport/Summary.txt

    - name: Add coverage to job summary
      run: |
        echo "## Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
        cat TestResults/coveragereport/Summary.txt >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Full report available as artifact" >> $GITHUB_STEP_SUMMARY

  build:
    name: Build and Package
    runs-on: ubuntu-latest
    needs: test
    permissions:
      actions: read
      checks: write
      contents: write
      pull-requests: write
      security-events: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          9.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Determine package version
      id: package-version
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z\.-]+)?$ ]]; then
            echo "Invalid tag version format: $VERSION"
            exit 1
          fi
        else
          VERSION="0.0.0-ci.${GITHUB_RUN_NUMBER}"
        fi
        echo "value=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Build solution
      run: dotnet build --no-restore --configuration Release /p:Version=${{ steps.package-version.outputs.value }} /p:PackageVersion=${{ steps.package-version.outputs.value }}

    - name: Pack NuGet packages
      run: |
        dotnet pack UContentMapper.Core/UContentMapper.Core.csproj --no-build --configuration Release --output ./packages /p:Version=${{ steps.package-version.outputs.value }} /p:PackageVersion=${{ steps.package-version.outputs.value }}
        dotnet pack UContentMapper.Umbraco17/UContentMapper.Umbraco17.csproj --no-build --configuration Release --output ./packages /p:Version=${{ steps.package-version.outputs.value }} /p:PackageVersion=${{ steps.package-version.outputs.value }}
        
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      actions: read
      checks: write
      contents: write
      pull-requests: write
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          9.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Run security audit
      run: dotnet list package --vulnerable --include-transitive

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: csharp
        build-mode: none

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [test, build, security-scan]
    if: always()
    permissions:
      actions: read
      checks: write
      contents: write
      pull-requests: write
      security-events: write

    steps:
    - name: Check test results
      if: needs.test.result != 'success'
      run: |
        echo "Tests failed or were skipped"
        exit 1

    - name: Check build results
      if: needs.build.result != 'success'
      run: |
        echo "Build failed"
        exit 1

    - name: Check security scan results
      if: needs.security-scan.result != 'success'
      run: |
        echo "Security scan failed"
        exit 1

    - name: Quality gate passed
      run: echo "All quality checks passed successfully!"

  deploy:
    name: Deploy to NuGet
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          9.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        dotnet build --no-restore --configuration Release /p:Version=$VERSION /p:PackageVersion=$VERSION

    - name: Pack NuGet packages
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        dotnet pack UContentMapper.Core/UContentMapper.Core.csproj --no-build --configuration Release --output ./packages /p:Version=$VERSION /p:PackageVersion=$VERSION
        dotnet pack UContentMapper.Umbraco17/UContentMapper.Umbraco17.csproj --no-build --configuration Release --output ./packages /p:Version=$VERSION /p:PackageVersion=$VERSION

    - name: Validate NuGet API key
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        if [[ -z "$NUGET_API_KEY" ]]; then
          echo "NUGET_API_KEY secret is not set."
          exit 1
        fi

    - name: Add deploy summary
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        echo "## NuGet Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
        echo "- Version: $VERSION" >> "$GITHUB_STEP_SUMMARY"
        echo "- Source: https://api.nuget.org/v3/index.json" >> "$GITHUB_STEP_SUMMARY"
        echo "- Packages path: ./packages" >> "$GITHUB_STEP_SUMMARY"

    - name: Push to NuGet
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        shopt -s nullglob

        for package in ./packages/*.nupkg; do
          echo "Pushing $package to NuGet..."
          dotnet nuget push "$package" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate
        done

        for symbolPackage in ./packages/*.snupkg; do
          echo "Pushing symbols package $symbolPackage to NuGet..."
          dotnet nuget push "$symbolPackage" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate
        done